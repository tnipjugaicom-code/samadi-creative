<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samadi Creative | پورتفولیو</title>
    <style>
        /* دکوراسیون پایه - Design System */
        :root {
            --bg-color: #0f0f0f;
            --surface-color: #1a1a1a;
            --accent-color: #00ffcc;
            --text-main: #ffffff;
            --text-secondary: #a0a0a0;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; /* فعلاً فونت سیستم برای سرعت */
            line-height: 1.6;
        }

        /* بخش Hero */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
        }

        .hero h1 {
            font-size: 4rembottom
            margin-bottom: 10px;
            letter-spacing: -1px;
            background: linear-gradient(to right, #fff, var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            font-size: 1.5rem;
            color: var(--text-secondary);
            max-width: 600px;
        }

        /* دکمه مدرن */
        .cta-button {
            margin-top: 30px;
            padding: 12px 30px;
            border: 2px solid var(--accent-color);
            color: var(--accent-color);
            text-decoration: none;
            font-weight: bold;
            border-radius: 50px;
            transition: all 0.3s ease;
        }

        .cta-button:hover {
            background-color: var(--accent-color);
            color: var(--bg-color);
            box-shadow: 0 0 20px var(--accent-color);
        }

        /* افکت پس‌زمینه برای زیبایی بیشتر */
        .glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--accent-color);
            filter: blur(150px);
            opacity: 0.1;
            z-index: -1;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>

    <div class="glow"></div>

    <section class="hero">
        <h1>Samadi Creative</h1>
        <p>طراحی هوشمندانه، گرافیک خیره‌کننده و تجربه‌ی کاربری بی‌نقص</p>
        <a href="#portfolio" class="cta-button">مشاهده پروژه‌ها</a>
    </section>

</body>
</html>
