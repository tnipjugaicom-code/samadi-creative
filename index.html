<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samadi Creative | پورتفولیو</title>
    <style>
        /* 1. تنظیمات پایه و سیستم رنگی */
        :root {
            --bg-color: #0f0f0f;
            --surface-color: #1a1a1a;
            --accent-color: #00ffcc;
            --text-main: #ffffff;
            --text-secondary: #a0a0a0;
        }

        html { scroll-behavior: smooth; }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* 2. افکت درخشش پس‌زمینه */
        .glow {
            position: fixed;
            width: 500px;
            height: 500px;
            background: var(--accent-color);
            filter: blur(150px);
            opacity: 0.05;
            z-index: -1;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        /* 3. بخش Hero (با لوگوی جدید شما) */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
        }

        /* استایل لوگو */
        .main-logo {
            width: 180px; /* اندازه لوگو - می‌توانید تغییر دهید */
            height: auto;
            margin-bottom: 30px;
            border-radius: 20px; /* اگر می‌خواهید گوشه‌های لوگو گرد باشد */
            box-shadow: 0 10px 30px rgba(0, 255, 204, 0.2); /* سایه ملایم دور لوگو */
        }

        .hero h1 {
            font-size: clamp(2rem, 6vw, 3.5rem);
            margin-bottom: 10px;
            background: linear-gradient(to right, #fff, var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            font-size: clamp(1rem, 4vw, 1.4rem);
            color: var(--text-secondary);
            max-width: 600px;
        }

        .cta-button {
            margin-top: 40px;
            padding: 14px 40px;
            border: 2px solid var(--accent-color);
            color: var(--accent-color);
            text-decoration: none;
            font-weight: bold;
            border-radius: 50px;
            transition: all 0.3s ease;
        }

        .cta-button:hover {
            background-color: var(--accent-color);
            color: var(--bg-color);
            box-shadow: 0 0 30px var(--accent-color);
        }

        /* 4. بخش پورتفولیو */
        .portfolio {
            padding: 100px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .portfolio h2 {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 50px;
        }

        .portfolio h2::after {
            content: '';
            display: block;
            width: 50px;
            height: 4px;
            background: var(--accent-color);
            margin: 10px auto;
        }

        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .project-card {
            background-color: var(--surface-color);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.4s ease;
            border: 1px solid #222;
        }

        .project-card:hover {
            transform: translateY(-10px);
            border-color: var(--accent-color);
        }

        .project-img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            display: block;
            background-color: #333;
        }

        .project-info {
            padding: 20px;
        }

        .project-info h3 { margin: 0 0 10px 0; }
        .project-info p { color: var(--text-secondary); margin: 0; font-size: 0.9rem; }

        /* 5. فوتر */
        footer {
            text-align: center;
            padding: 50px 20px;
            color: var(--text-secondary);
            border-top: 1px solid #222;
        }
    </style>
</head>
<body>

    <div class="glow"></div>

    <!-- بخش Hero با لوگوی شما -->
    <section class="hero">
        <!-- لینک مستقیم لوگوی شما در اینجا قرار گرفت -->
        <img src="https://uploadkon.ir/uploads/4bd630_26551d9ac4-7299-4f25-9c05-058a7bbf1f40[1].png" alt="Samadi Creative Logo" class="main-logo">
        
        <h1>Samadi Creative</h1>
        <p>طراحی هوشمندانه، گرافیک خیره‌کننده و تجربه‌ی کاربری بی‌نقص</p>
        <a href="#portfolio" class="cta-button">مشاهده پروژه‌ها</a>
    </section>

    <!-- بخش پورتفولیو -->
    <section class="portfolio" id="portfolio">
        <h2>آثار من</h2>
        <div class="portfolio-grid">
            
            <!-- پروژه ۱ -->
            <div class="project-card">
                <img src="project1.png" class="project-img" alt="پروژه ۱">
                <div class="project-info">
                    <h3>طراحی لوگو</h3>
                    <p>توضیحات کوتاه درباره این پروژه...</p>
                </div>
            </div>

            <!-- پروژه ۲ -->
            <div class="project-card">
                <img src="project2.png" class="project-img" alt="پروژه ۲">
                <div class="project-info">
                    <h3>طراحی سایت</h3>
                    <p>توضیحات کوتاه درباره این پروژه...</p>
                </div>
            </div>

            <!-- پروژه ۳ -->
            <div class="project-card">
                <img src="project3.png" class="project-img" alt="پروژه ۳">
                <div class="project-info">
                    <h3>برندینگ</h3>
                    <p>توضیحات کوتاه درباره این پروژه...</p>
                </div>
            </div>

        </div>
    </section>

    <footer>
        <p>&copy; 2026 Samadi Creative. تمامی حقوق محفوظ است.</p>
    </footer>

</body>
</html>
